# nox.church — static landing page.
# Served over plain HTTP; Cloudflare terminates TLS at the edge (same as
# sammysnipes.com). This is a non-default server block, so it only handles
# requests with Host: nox.church — the existing default_server is untouched.
#
# install:
#   scp deploy/nox.church.conf droplet:/etc/nginx/sites-available/nox.church
#   ssh droplet 'ln -sf /etc/nginx/sites-available/nox.church /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx'
server {
    listen 80;
    listen [::]:80;

    root /var/www/nox;
    index index.html;

    server_name nox.church www.nox.church;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
