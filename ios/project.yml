name: Nox
options:
  bundleIdPrefix: com.samuelellis
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
targets:
  Nox:
    type: application
    platform: iOS
    sources:
      - Nox
    entitlements:
      path: Nox/Nox.entitlements
      properties:
        com.apple.developer.family-controls: true
    info:
      path: Nox/Info.plist
      properties:
        CFBundleDisplayName: nox
        CFBundleName: Nox
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.samuelellis.nox
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      SWIFT_VERSION: "5.10"
      DEVELOPMENT_TEAM: ""
